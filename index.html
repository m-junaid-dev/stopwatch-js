<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Watch</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <h1>STOP WATCH</h1>

        <div class="screen-timer">
            <span>00:00:00</span>
        </div>

        <div class="button-section">
            <button id="startbtn" class="btn1">▶</button>
            <button id="Stopbtn" class="btn2">⏸</button>
            <button id="Resetbtn" class="btn3">🔁</button>

        </div>
    </div>


    <script src="./app.js"></script>
</body>
</html>
